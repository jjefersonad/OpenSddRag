services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opensddrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opensddrag}
      POSTGRES_DB: ${POSTGRES_DB:-opensddrag}
    ports:
      - "${DB_PORT:-54326}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opensddrag} -d ${POSTGRES_DB:-opensddrag}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mcp:
    build: ./mcp-server
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-opensddrag}:${POSTGRES_PASSWORD:-opensddrag}@db:5432/${POSTGRES_DB:-opensddrag}}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      OPENSDDRAG_PROJECT: ${OPENSDDRAG_PROJECT:-default}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: