# Isolated test database for the improve-retrieval-accuracy work.
# Disposable Postgres instance so migrations and re-embed experiments never
# touch the production data. Start with:
#   docker compose -f docker-compose.test.yml up -d
name: opensddrag-test
services:
  db-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER:-opensddrag}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-opensddrag}
      POSTGRES_DB: ${TEST_POSTGRES_DB:-opensddrag_test}
    ports:
      - "${TEST_DB_PORT:-54327}:5432"
    volumes:
      - pgtestdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_POSTGRES_USER:-opensddrag} -d ${TEST_POSTGRES_DB:-opensddrag_test}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgtestdata:
